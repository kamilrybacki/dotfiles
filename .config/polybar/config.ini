;; Polybar config — Everforest Cozy + Ditherpunk

[colors]
bg = ${xrdb:background:#2e383c}
bg-dim = ${xrdb:efBgDim:#272e33}
bg1 = ${xrdb:efBg1:#374145}
fg = ${xrdb:foreground:#d3c6aa}
green = ${xrdb:efGreen:#a7c080}
aqua = ${xrdb:efAqua:#83c092}
blue = ${xrdb:efBlue:#7fbbb3}
yellow = ${xrdb:efYellow:#dbbc7f}
orange = ${xrdb:efOrange:#e69875}
red = ${xrdb:efRed:#e67e80}
purple = ${xrdb:efPurple:#d699b6}
muted = #4a555b

[bar/main]
width = 100%
height = 28pt
offset-y = 0
bottom = false

background = ${colors.bg-dim}
foreground = ${colors.fg}

font-0 = "JetBrainsMono Nerd Font:size=10;3"
font-1 = "JetBrainsMono Nerd Font:size=14;4"

padding-left = 1
padding-right = 1
module-margin = 0

modules-left = i3
modules-center = date
modules-right = sep pulseaudio sep memory sep cpu sep

separator =
wm-restack = i3
override-redirect = false
cursor-click = pointer

enable-ipc = true

[module/sep]
type = custom/text
content = " ░▒░ "
content-foreground = ${colors.muted}

[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true

label-focused = %index%
label-focused-foreground = ${colors.bg-dim}
label-focused-background = ${colors.green}
label-focused-padding = 2

label-unfocused = %index%
label-unfocused-foreground = ${colors.fg}
label-unfocused-background = ${colors.bg-dim}
label-unfocused-padding = 2

label-urgent = %index%
label-urgent-foreground = ${colors.bg-dim}
label-urgent-background = ${colors.red}
label-urgent-padding = 2

label-visible = %index%
label-visible-foreground = ${colors.fg}
label-visible-background = ${colors.bg1}
label-visible-padding = 2

[module/date]
type = internal/date
interval = 30

date = %a %b %d
time = %H:%M

label = %date%  %time%
label-foreground = ${colors.fg}

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true
interval = 5

format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-volume-foreground = ${colors.fg}

label-muted = 󰝟 muted
label-muted-foreground = ${colors.muted}

ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀
ramp-volume-2 = 󰕾
ramp-volume-foreground = ${colors.aqua}

[module/memory]
type = internal/memory
interval = 3

format = <label>
label = 󰍛 %used%
label-foreground = ${colors.fg}

[module/cpu]
type = internal/cpu
interval = 3

format = <label>
label = 󰻠 %percentage%%
label-foreground = ${colors.fg}
